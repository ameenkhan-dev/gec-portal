# ===========================================
# Render Blueprint Specification
# https://render.com/docs/blueprint-spec
# ===========================================

services:
  # ===========================================
  # Web Service - Express.js Backend
  # ===========================================
  - type: web
    name: gec-portal-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gec-portal-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false  # Set manually after frontend is deployed
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

# ===========================================
# PostgreSQL Database (Free Tier)
# ===========================================
databases:
  - name: gec-portal-db
    plan: free
    databaseName: gec_event_portal
    user: gec_admin
